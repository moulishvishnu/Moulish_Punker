<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram DP Picture Studio</title>
    <style>
        /* Instagram Dark Mode System Colors */
        :root {
            --bg-pure-black: #000000;
            --card-elevation-1: #121212;
            --card-elevation-2: #1c1c1e;
            --border-subtle: #262626;
            --text-primary: #f5f5f5;
            --text-secondary: #a8a8a8;
            --insta-blue: #0095f6;
            --insta-blue-hover: #1877f2;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-pure-black);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .app-container {
            background-color: var(--card-elevation-1);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            padding: 24px;
            width: 100%;
            max-width: 390px;
            box-shadow: 0 12px 36px rgba(0, 0, 0, 0.7);
        }

        h1 {
            font-size: 20px;
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 24px;
            text-align: center;
            letter-spacing: -0.5px;
        }

        /* Pure Circle Display Constraints */
        .preview-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-subtle);
        }

        .canvas-circle-mask {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid var(--border-subtle);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
            background-color: #151515;
        }

        canvas {
            display: block;
        }

        .spec-label {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 10px;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            font-weight: 600;
        }

        /* Control Architecture Layout */
        .control-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .control-row {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        /* Multi-column rows for side-by-side components */
        .control-split {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"], select, input[type="range"] {
            width: 100%;
            padding: 10px;
            background-color: var(--card-elevation-2);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            box-sizing: border-box;
            outline: none;
        }

        /* Custom Visual Color Swatch Input Wrapper */
        .color-picker-wrapper {
            display: flex;
            align-items: center;
            background-color: var(--card-elevation-2);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            padding: 6px 10px;
            gap: 10px;
            height: 40px;
            box-sizing: border-box;
        }

        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            background: none;
            padding: 0;
        }

        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        input[type="color"]::-webkit-color-swatch {
            border: 1px solid var(--border-subtle);
            border-radius: 50%;
        }

        .slider-flex {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .slider-flex span {
            font-size: 12px;
            color: var(--text-secondary);
            min-width: 32px;
            text-align: right;
        }

        /* Segmented Radio Controls Mapping */
        .segmented-tabs {
            display: flex;
            background-color: var(--card-elevation-2);
            padding: 3px;
            border-radius: 8px;
            border: 1px solid var(--border-subtle);
        }

        .segmented-tabs input[type="radio"] {
            display: none;
        }

        .segmented-tabs label {
            flex: 1;
            text-align: center;
            padding: 8px;
            margin: 0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            text-transform: none;
            letter-spacing: normal;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .segmented-tabs input[type="radio"]:checked + label {
            background-color: var(--insta-blue);
            color: #ffffff;
        }

        /* CTA Download Action Pipeline */
        .btn-action-download {
            background-color: var(--insta-blue);
            color: #ffffff;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
            transition: background-color 0.2s ease;
        }

        .btn-action-download:hover {
            background-color: var(--insta-blue-hover);
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Cinzel:wght@700&family=Grand+Hotel&family=Plus+Jakarta+Sans:wght@800&display=swap" rel="stylesheet">
</head>
<body>

<div class="app-container">
    <h1>Profile DP Generator</h1>
    
    <div class="preview-wrapper">
        <div class="canvas-circle-mask">
            <canvas id="appCanvas" width="110" height="110"></canvas>
        </div>
        <div class="spec-label">110 × 110 px • Circular Only</div>
    </div>

    <div class="control-grid">
        
        <div class="control-row">
            <label for="textNode">Logo Text / Monogram</label>
            <input type="text" id="textNode" value="DP" maxlength="3" placeholder="XYZ">
        </div>

        <div class="control-split">
            <div class="control-row">
                <label for="bgGradSelect">Gradient Theme</label>
                <select id="bgGradSelect">
                    <option value="sunset">IG Gradient</option>
                    <option value="cosmic">Cyber Purple</option>
                    <option value="mint">Electric Mint</option>
                    <option value="matte">Matte Carbon</option>
                </select>
            </div>
            <div class="control-row">
                <label for="fontColorPicker">Font Color</label>
                <div class="color-picker-wrapper">
                    <input type="color" id="fontColorPicker" value="#ffffff">
                    <span style="font-size: 13px;">Custom</span>
                </div>
            </div>
        </div>

        <div class="control-row">
            <label for="textureEngineSelect">Texture Overlay</label>
            <select id="textureEngineSelect">
                <option value="none">None (Sleek Clean)</option>
                <option value="grid">Tech Matrix Mesh</option>
                <option value="dots">Micro Polka Halftone</option>
                <option value="noise">Retro Analog Noise Grain</option>
            </select>
        </div>

        <div class="control-split">
            <div class="control-row">
                <label for="fontFamilySelect">Font Family</label>
                <select id="fontFamilySelect">
                    <option value="'Plus Jakarta Sans', sans-serif">Neo-Grotesk</option>
                    <option value="'Anton', sans-serif">Bold Impact</option>
                    <option value="'Cinzel', serif">Luxury Serif</option>
                    <option value="'Grand Hotel', cursive">Vintage Script</option>
                </select>
            </div>
            <div class="control-row">
                <label for="fontSizeRange">Font Size</label>
                <div class="slider-flex">
                    <input type="range" id="fontSizeRange" min="20" max="70" value="45">
                    <span id="fontSizeDisplay">45px</span>
                </div>
            </div>
        </div>

        <div class="control-row">
            <label>Dimension Rendering Architecture</label>
            <div class="segmented-tabs">
                <input type="radio" id="toggle2D" name="depthControl" value="2d" checked>
                <label for="toggle2D">2D Minimal Flat</label>
                
                <input type="radio" id="toggle3D" name="depthControl" value="3d">
                <label for="toggle3D">3D Deep Extrusion</label>
            </div>
        </div>

        <button class="btn-action-download" id="exportActionBtn">Download Profile Picture</button>
    </div>
</div>

<script>
    // Interface & Logic Variables Initialization
    const canvas = document.getElementById('appCanvas');
    const ctx = canvas.getContext('2d');

    const textNode = document.getElementById('textNode');
    const bgGradSelect = document.getElementById('bgGradSelect');
    const fontColorPicker = document.getElementById('fontColorPicker');
    const textureEngineSelect = document.getElementById('textureEngineSelect');
    const fontFamilySelect = document.getElementById('fontFamilySelect');
    const fontSizeRange = document.getElementById('fontSizeRange');
    const fontSizeDisplay = document.getElementById('fontSizeDisplay');
    const toggle2D = document.getElementById('toggle2D');
    const toggle3D = document.getElementById('toggle3D');
    const exportActionBtn = document.getElementById('exportActionBtn');

    // Gradient Presets Map Matrix
    const gradProfiles = {
        sunset: ['#f9ce34', '#ee2a7b', '#6228d7'],
        cosmic: ['#4158D0', '#C850C0', '#FFCC70'],
        mint: ['#0093E9', '#80D0C7'],
        matte: ['#3a3d40', '#181a1b', '#000000']
    };

    /**
     * Draw Render Loop Engine 
     * Assembles selected background vectors, textures, and typeface properties inside canvas buffer elements
     */
    function processGraphicsPipeline() {
        const size = 110; // Instantiates 110px dimensional geometry rules natively
        ctx.clearRect(0, 0, size, size);

        // --- 1. Compute Base Vector Gradient Canvas Elements ---
        const activeColors = gradProfiles[bgGradSelect.value];
        let spatialGradient = ctx.createLinearGradient(0, 0, size, size);
        
        if (activeColors.length === 2) {
            spatialGradient.addColorStop(0, activeColors[0]);
            spatialGradient.addColorStop(1, activeColors[1]);
        } else {
            spatialGradient.addColorStop(0, activeColors[0]);
            spatialGradient.addColorStop(0.5, activeColors[1]);
            spatialGradient.addColorStop(1, activeColors[2]);
        }
        ctx.fillStyle = spatialGradient;
        ctx.fillRect(0, 0, size, size);

        // --- 2. Compute Texture Vector Overlays ---
        const textureType = textureEngineSelect.value;
        ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';

        if (textureType === 'grid') {
            for (let index = 0; index < size; index += 8) {
                ctx.fillRect(index, 0, 1, size);
                ctx.fillRect(0, index, size, 1);
            }
        } else if (textureType === 'dots') {
            for (let coordX = 4; coordX < size; coordX += 10) {
                for (let coordY = 4; coordY < size; coordY += 10) {
                    ctx.beginPath();
                    ctx.arc(coordX, coordY, 1.3, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        } else if (textureType === 'noise') {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.08)';
            for (let iteration = 0; iteration < 450; iteration++) {
                let nodeX = Math.random() * size;
                let nodeY = Math.random() * size;
                ctx.fillRect(nodeX, nodeY, 1.2, 1.2);
            }
        }

        // --- 3. Compute Typography Configurations & Metrics ---
        const rawText = textNode.value;
        const fontName = fontFamilySelect.value;
        const fontSize = fontSizeRange.value;
        const chosenTextColor = fontColorPicker.value;
        
        ctx.font = `bold ${fontSize}px ${fontName}`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        // --- 4. Process Dimensional Transformations Logic ---
        if (toggle3D.checked) {
            // Renders layered spatial shadows to calculate isometric depth dimensions
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillText(rawText, (size / 2) + 3, (size / 2) + 3);
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.fillText(rawText, (size / 2) + 2, (size / 2) + 2);
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.fillText(rawText, (size / 2) + 1, (size / 2) + 1);

            // Primary typography surface layer assembly
            ctx.fillStyle = chosenTextColor;
            ctx.fillText(rawText, size / 2, size / 2);
        } else {
            // Clean 2D Styling Flat Layer
            ctx.fillStyle = chosenTextColor;
            ctx.fillText(rawText, size / 2, size / 2);
        }
    }

    /**
     * Download Matrix Processing Architecture
     * Strips square visual elements inside offscreen buffers to guarantee a cleanly clipped native circular PNG file asset
     */
    function executeImageDownload() {
        const structuralCanvas = document.createElement('canvas');
        structuralCanvas.width = 110;
        structuralCanvas.height = 110;
        const maskContext = structuralCanvas.getContext('2d');

        // Apply a strict mathematical vector circle clipping mask path 
        maskContext.beginPath();
        maskContext.arc(55, 55, 55, 0, Math.PI * 2);
        maskContext.clip();

        // Write live canvas graphics array context states directly onto the circular offscreen download frame
        maskContext.drawImage(canvas, 0, 0);

        // Generate download payloads safely routed through virtual anchors mapping to browser disk directories
        const triggerAnchor = document.createElement('a');
        triggerAnchor.download = `instagram_circle_dp_${textNode.value || 'logo'}.png`;
        triggerAnchor.href = structuralCanvas.toDataURL('image/png');
        triggerAnchor.click();
    }

    // Event Listener Routing Configuration
    textNode.addEventListener('input', processGraphicsPipeline);
    bgGradSelect.addEventListener('change', processGraphicsPipeline);
    fontColorPicker.addEventListener('input', processGraphicsPipeline);
    textureEngineSelect.addEventListener('change', processGraphicsPipeline);
    fontFamilySelect.addEventListener('change', processGraphicsPipeline);
    toggle2D.addEventListener('change', processGraphicsPipeline);
    toggle3D.addEventListener('change', processGraphicsPipeline);
    
    fontSizeRange.addEventListener('input', (event) => {
        fontSizeDisplay.textContent = `${event.target.value}px`;
        processGraphicsPipeline();
    });
    
    exportActionBtn.addEventListener('click', executeImageDownload);

    // Document System Startup Triggers
    window.onload = () => {
        // Enforces a brief 300ms layout execution buffer wait time to ensure custom fonts compile before the Canvas draws
        setTimeout(processGraphicsPipeline, 300);
    };
</script>

</body>
</html>
