<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>Cyber Volleyball: Overdrive</title>
    <style>
        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background-color: #020205; 
            font-family: 'Orbitron', 'Segoe UI', system-ui, sans-serif; user-select: none;
            touch-action: none;
        }
        
        /* High-Contrast Arcade HUD */
        #hud {
            position: absolute;
            top: env(safe-area-inset-top, 20px);
            left: 50%;
            transform: translateX(-50%);
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 92%;
            max-width: 600px;
            pointer-events: none;
            z-index: 10;
        }
        .hud-card {
            background: linear-gradient(135deg, rgba(6, 7, 20, 0.95) 0%, rgba(2, 2, 8, 0.98) 100%);
            border: 2px solid #00f2ff;
            clip-path: polygon(10px 0%, 100% 0%, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0% 100%, 0% 10px);
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.4);
            padding: 10px 8px;
            color: white;
            text-align: center;
            backdrop-filter: blur(8px);
        }
        .hud-card.high { border-color: #ff0055; box-shadow: 0 0 25px rgba(255, 0, 85, 0.4); }
        .hud-card.multiplier { border-color: #ccff00; box-shadow: 0 0 25px rgba(204, 255, 0, 0.4); }
        
        .hud-label { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: #8a99ad; margin-bottom: 4px; font-weight: 800; }
        .hud-value { font-size: 24px; font-weight: 900; font-family: monospace; text-shadow: 0 0 10px rgba(255,255,255,0.6); }
        
        #instructions { 
            position: absolute; bottom: calc(env(safe-area-inset-bottom, 20px) + 10px); 
            left: 50%; transform: translateX(-50%); 
            color: #00f2ff; font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
            text-shadow: 0 0 12px rgba(0, 242, 255, 0.8); pointer-events: none; z-index: 10;
            background: rgba(2, 2, 6, 0.9); padding: 8px 20px; 
            border: 2px solid #00f2ff;
            border-radius: 4px; width: 85%; max-width: 360px; text-align: center;
            font-weight: 700;
        }

        #audio-prompt {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #070814 0%, #010103 100%); 
            display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100; color: white;
            padding: 20px; text-align: center;
        }
        h1 { 
            font-size: clamp(28px, 7vw, 54px); margin-bottom: 25px; letter-spacing: 6px; 
            text-shadow: 0 0 20px #00f2ff, 0 0 40px #ccff00; text-transform: uppercase;
            font-weight: 900;
        }
        
        .poster-art {
            width: 220px; height: 300px;
            background-image: url('https://cdn.displate.com/artwork/270x380/2025-10-13/1efe42b9-accb-4ed0-bc25-7bf87cda9a63.jpg');
            background-size: cover; background-position: center;
            border-radius: 4px; border: 3px solid #ccff00;
            box-shadow: 0 0 35px rgba(204, 255, 0, 0.7); margin-bottom: 35px;
            animation: float 2.5s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-12px) rotate(1deg); }
        }

        .play-btn {
            background: linear-gradient(135deg, #00f2ff 0%, #ccff00 100%); border: none;
            color: #000; padding: 15px 45px; font-size: clamp(18px, 4vw, 24px); font-weight: 900;
            cursor: pointer; box-shadow: 0 0 35px rgba(0,242,255,0.5);
            text-transform: uppercase; letter-spacing: 3px;
            clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
            transition: transform 0.1s ease;
        }
        .play-btn:active { transform: scale(0.95); }
        
        @media (min-width: 768px) {
            .hud-card { padding: 14px 25px; }
            .hud-value { font-size: 32px; }
            .hud-label { font-size: 11px; }
            #instructions { font-size: 14px; width: auto; max-width: none; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="audio-prompt">
        <h1>Cyber Volleyball<br><span style="font-size:0.5em; color:#00f2ff;">Overdrive</span></h1>
        <div class="poster-art"></div>
        <button class="play-btn" onclick="initGameAudio()">Enter Arena</button>
    </div>

    <div id="hud">
        <div class="hud-card">
            <div class="hud-label">Score</div>
            <div class="hud-value" id="score">0</div>
        </div>
        <div class="hud-card multiplier">
            <div class="hud-label">Multiplier</div>
            <div class="hud-value" id="mult">x1</div>
        </div>
        <div class="hud-card high">
            <div class="hud-label">Top Record</div>
            <div class="hud-value" id="highscore">0</div>
        </div>
    </div>
    
    <div id="instructions">Slam the ball within the target zone!</div>

    <script>
        // --- 1. AUDIO SYNTH ENGINE ---
        let audioCtx, musicNode, filterNode;
        
        function initGameAudio() {
            document.getElementById('audio-prompt').style.display = 'none';
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            const bufferSize = audioCtx.sampleRate * 2; 
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            
            for (let i = 0; i < bufferSize; i++) {
                let t = i / audioCtx.sampleRate;
                data[i] = Math.sin(2 * Math.PI * 60 * t + Math.sin(2 * Math.PI * 130 * t) * 0.45) * 0.15;
                if (i % (audioCtx.sampleRate / 4) < 1800) data[i] += (Math.random() - 0.5) * 0.06;
            }

            musicNode = audioCtx.createBufferSource();
            musicNode.buffer = buffer;
            musicNode.loop = true;
            filterNode = audioCtx.createBiquadFilter();
            filterNode.type = 'lowpass';
            filterNode.frequency.setValueAtTime(1100, audioCtx.currentTime);

            musicNode.connect(filterNode);
            filterNode.connect(audioCtx.destination);
            musicNode.start();
        }

        function playSpikeSound() {
            if (!audioCtx) return;
            let osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.25);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.25);
        }

        function playMissSound() {
            if (!audioCtx) return;
            let osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            osc.type = 'triangle'; osc.frequency.setValueAtTime(120, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(20, audioCtx.currentTime + 0.4);
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.4);
        }

        // --- 2. THREE.JS SCENE EXECUTION ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x010104);
        scene.fog = new THREE.FogExp2(0x010104, 0.025);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const originalCamPos = new THREE.Vector3(0, 7.0, 13.5);
        camera.position.copy(originalCamPos);

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); 
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.3;
        document.body.appendChild(renderer.domElement);

        // --- 3. THE ARENA: EXTREME CYBERPUNK MEGAPLEX ---
        scene.add(new THREE.AmbientLight(0x101428, 2.5));
        
        const keyLightLeft = new THREE.SpotLight(0xccff00, 15, 45, Math.PI/3.5, 0.5, 0.8);
        keyLightLeft.position.set(-12, 18, 6); keyLightLeft.castShadow = true; scene.add(keyLightLeft);

        const keyLightRight = new THREE.SpotLight(0x00f2ff, 15, 45, Math.PI/3.5, 0.5, 0.8);
        keyLightRight.position.set(12, 18, -6); keyLightRight.castShadow = true; scene.add(keyLightRight);

        // Jet Black High-Contrast Tech Floor
        const courtGeo = new THREE.BoxGeometry(18.6, 0.4, 9.6);
        const courtMat = new THREE.MeshStandardMaterial({ color: 0x020306, roughness: 0.1, metalness: 0.9 });
        const court = new THREE.Mesh(courtGeo, courtMat);
        court.position.y = -0.2; court.receiveShadow = true; scene.add(court);

        const courtGrid = new THREE.GridHelper(18, 18, 0x00f2ff, 0xccff00);
        courtGrid.position.y = 0.03; courtGrid.scale.set(1, 1, 0.5);
        scene.add(courtGrid);

        // Neon Stadium Lighting Rigs
        function createLightTower(x, z, color) {
            const tower = new THREE.Group();
            const beamGeo = new THREE.CylinderGeometry(0.1, 1.5, 18, 16, 1, true);
            const beamMat = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.15, side: THREE.DoubleSide });
            const beam = new THREE.Mesh(beamGeo, beamMat);
            beam.position.y = 9; beam.rotation.z = x > 0 ? -0.12 : 0.12;
            tower.add(beam);
            tower.position.set(x, 0, z);
            scene.add(tower);
        }
        createLightTower(-11, -7, 0xccff00);
        createLightTower(11, -7, 0x00f2ff);

        // Pulsing Neon Net
        const netGroup = new THREE.Group();
        const postMat = new THREE.MeshStandardMaterial({ color: 0x0a0c16, metalness: 0.9, roughness: 0.05 });
        const postGeo = new THREE.CylinderGeometry(0.12, 0.12, 4.5);
        const p1 = new THREE.Mesh(postGeo, postMat); p1.position.set(0, 2.25, 4.8); p1.castShadow = true;
        const p2 = new THREE.Mesh(postGeo, postMat); p2.position.set(0, 2.25, -4.8); p2.castShadow = true;
        netGroup.add(p1, p2);

        const netMesh = new THREE.Mesh(
            new THREE.PlaneGeometry(1, 1.6), 
            new THREE.MeshStandardMaterial({ color: 0xff0055, emissive: 0xff0055, emissiveIntensity: 3.0, wireframe: true, side: THREE.DoubleSide })
        );
        netMesh.position.set(0, 2.7, 0); netMesh.rotation.y = Math.PI / 2; netMesh.scale.set(1, 1, 9.6);
        netGroup.add(netMesh); scene.add(netGroup);

        // --- 4. HOLOGRAPHIC CHEERING AUDIENCE ---
        const audienceGroup = new THREE.Group();
        const audienceMembers = [];
        const audGeo = new THREE.CylinderGeometry(0.15, 0.05, 0.6, 4);
        
        // Generate stands of cheering cyber figures on the far side
        for (let i = 0; i < 24; i++) {
            const color = i % 2 === 0 ? 0x00f2ff : 0xccff00;
            const audMat = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.5, wireframe: true });
            const member = new THREE.Mesh(audGeo, audMat);
            
            // Grid layout behind the court
            const row = i % 2;
            const col = Math.floor(i / 2);
            member.position.set(-8.5 + col * 0.75, 0.6 + row * 0.4, -5.5 - row * 0.6);
            
            audienceGroup.add(member);
            audienceMembers.push({
                mesh: member,
                baseY: member.position.y,
                offset: Math.random() * Math.PI * 2,
                speed: 4 + Math.random() * 4
            });
        }
        scene.add(audienceGroup);

        // --- 5. ULTRA-CONTRAST MECHANICAL PLAYERS ---
        function createAthleticCyberPlayer(colorHex) {
            const botGroup = new THREE.Group();
            // Solid, deep matte armor templates to contrast neon elements
            const armorMat = new THREE.MeshStandardMaterial({ color: 0x0a0c14, metalness: 0.95, roughness: 0.05 });
            const neonMat = new THREE.MeshStandardMaterial({ color: colorHex, emissive: colorHex, emissiveIntensity: 4.0 });
            const skinMat = new THREE.MeshStandardMaterial({ color: 0x181b28, metalness: 0.3, roughness: 0.4 });

            const pelvis = new THREE.Mesh(new THREE.SphereGeometry(0.25, 12, 12), armorMat);
            pelvis.position.y = 1.1; botGroup.add(pelvis);

            const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.18, 1.1, 6), armorMat);
            torso.position.y = 1.7; torso.rotation.y = Math.PI/6; botGroup.add(torso);

            // Large Core Frame Matrix
            const powerCore = new THREE.Mesh(new THREE.SphereGeometry(0.16, 8, 8), neonMat);
            powerCore.position.set(0, 1.8, 0.2); botGroup.add(powerCore);

            const head = new THREE.Mesh(new THREE.BoxGeometry(0.32, 0.35, 0.35), armorMat);
            head.position.y = 2.45; botGroup.add(head);
            const visor = new THREE.Mesh(new THREE.BoxGeometry(0.34, 0.09, 0.2), neonMat);
            visor.position.set(0, 2.5, 0.12); botGroup.add(visor);

            // Neon Highlighted Armor Shells
            const leftArm = new THREE.Group(); leftArm.position.set(-0.48, 2.1, 0);
            const lShoulder = new THREE.Mesh(new THREE.SphereGeometry(0.16, 8, 8), neonMat); leftArm.add(lShoulder);
            const lBicep = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.06, 0.75), skinMat); lBicep.position.y = -0.35; leftArm.add(lBicep);
            botGroup.add(leftArm);
            
            const rightArm = new THREE.Group(); rightArm.position.set(0.48, 2.1, 0);
            const rShoulder = new THREE.Mesh(new THREE.SphereGeometry(0.16, 8, 8), neonMat); rightArm.add(rShoulder);
            const rBicep = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.06, 0.75), skinMat); rBicep.position.y = -0.35; rightArm.add(rBicep);
            botGroup.add(rightArm);

            const leftLeg = new THREE.Group(); leftLeg.position.set(-0.2, 1.1, 0);
            const lThigh = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.08, 0.6), armorMat); lThigh.position.y = -0.3; lThigh.rotation.z = 0.1; leftLeg.add(lThigh);
            const lShin = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.06, 0.6), neonMat); lShin.position.set(0.05, -0.8, 0); leftLeg.add(lShin);
            botGroup.add(leftLeg);

            const rightLeg = new THREE.Group(); rightLeg.position.set(0.2, 1.1, 0);
            const rThigh = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.08, 0.6), armorMat); rThigh.position.y = -0.3; rThigh.rotation.z = -0.1; rightLeg.add(rThigh);
            const rShin = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.06, 0.6), neonMat); rShin.position.set(-0.05, -0.8, 0); rightLeg.add(rShin);
            botGroup.add(rightLeg);

            botGroup.traverse(child => { if(child.isMesh) { child.castShadow = true; child.receiveShadow = true; } });
            return { mesh: botGroup, lArm: leftArm, rArm: rightArm, head: head, torso: torso };
        }

        // Team 1: Volt Yellow/Green (Extremely Visible)
        const playerLeft = createAthleticCyberPlayer(0xccff00);
        playerLeft.mesh.position.set(-5, 0, 0); playerLeft.mesh.rotation.y = Math.PI / 2; scene.add(playerLeft.mesh);

        // Team 2: Electric Vivid Cyan
        const playerRight = createAthleticCyberPlayer(0x00f2ff);
        playerRight.mesh.position.set(5, 0, 0); playerRight.mesh.rotation.y = -Math.PI / 2; scene.add(playerRight.mesh);

        // --- 6. PLASMA BALL & CONTRAST RING VFX ---
        const ballRadius = 0.42;
        const ballGroup = new THREE.Group();
        
        // High Contrast Hot Plasma Core (Orange-Red Core vs Blue/Green Field)
        const ballCore = new THREE.Mesh(
            new THREE.SphereGeometry(ballRadius, 32, 32),
            new THREE.MeshStandardMaterial({ color: 0xff3300, emissive: 0xff6600, emissiveIntensity: 5.0, roughness: 0.1 })
        );
        ballGroup.add(ballCore);

        // Hyper-Bright Tracker Rings
        const ringGeo = new THREE.TorusGeometry(ballRadius * 1.18, 0.04, 8, 32);
        const ringMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
        const ballRing1 = new THREE.Mesh(ringGeo, ringMat); ballGroup.add(ballRing1);
        const ballRing2 = new THREE.Mesh(ringGeo, ringMat); ballRing2.rotation.x = Math.PI/2; ballGroup.add(ballRing2);
        
        ballCore.castShadow = true; scene.add(ballGroup);

        const targetFactor = window.innerWidth < 768 ? 6.2 : 4.6;
        const hitBoxCollider = new THREE.Mesh(new THREE.SphereGeometry(ballRadius * targetFactor, 8, 8), new THREE.MeshBasicMaterial({ visible: false }));
        ballGroup.add(hitBoxCollider);

        // Contrast Shockwave Ring
        const shockwaveGeo = new THREE.RingGeometry(0.1, 3.5, 32);
        const shockwaveMat = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide, transparent: true, opacity: 0 });
        const shockwave = new THREE.Mesh(shockwaveGeo, shockwaveMat);
        shockwave.rotation.x = Math.PI / 2; scene.add(shockwave);

        // Spark Particle Burst Engine
        const particleCount = 45;
        const particleGeometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const velocities = [];
        for(let i=0; i<particleCount*3; i++) positions[i] = 0;
        particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        
        const particleMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.4, transparent: true, opacity: 0, blending: THREE.AdditiveBlending });
        const particleSystem = new THREE.Points(particleGeometry, particleMaterial);
        scene.add(particleSystem);

        // Runtime Physics Variables
        let ballPos = new THREE.Vector3(4, 5.5, 0);
        let ballVelocity = new THREE.Vector3(-0.065, 0.085, 0.015);
        let gravity = -0.0038;
        let baseScore = 0, streakMultiplier = 1, cumulativeScore = 0, highScore = 0;
        let cameraShakeIntensity = 0;
        let clock = new THREE.Clock();

        // --- 7. CONTROLLERS ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function handleStrikeInput(clientX, clientY) {
            mouse.x = (clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            
            if (raycaster.intersectObject(hitBoxCollider).length > 0) {
                playSpikeSound();
                cameraShakeIntensity = 0.25;

                // Match shockwave colors directly with the strike side player colors
                const activeColor = ballPos.x > 0 ? 0x00f2ff : 0xccff00;

                shockwave.position.copy(ballGroup.position);
                shockwave.position.y = 0.05;
                shockwave.scale.set(0.1, 0.1, 0.1);
                shockwaveMat.opacity = 0.95;
                shockwaveMat.color.setHex(activeColor);

                const pPos = particleGeometry.attributes.position.array;
                velocities.length = 0;
                particleMaterial.color.setHex(activeColor);
                for(let i=0; i<particleCount; i++) {
                    pPos[i*3] = ballGroup.position.x; pPos[i*3+1] = ballGroup.position.y; pPos[i*3+2] = ballGroup.position.z;
                    velocities.push(new THREE.Vector3((Math.random()-0.5)*0.35, (Math.random()-0.4)*0.45, (Math.random()-0.5)*0.35));
                }
                particleGeometry.attributes.position.needsUpdate = true;
                particleMaterial.opacity = 1.0;

                baseScore++;
                if (baseScore % 3 === 0) streakMultiplier++;
                cumulativeScore += (100 * streakMultiplier);
                
                document.getElementById('score').innerText = cumulativeScore;
                document.getElementById('mult').innerText = `x${streakMultiplier}`;
                
                if(cumulativeScore > highScore) {
                    highScore = cumulativeScore;
                    document.getElementById('highscore').innerText = highScore;
                }

                ballVelocity.y = 0.18;
                ballVelocity.x = (ballPos.x > 0) ? -0.085 : 0.085;
                ballVelocity.z = (Math.random() - 0.5) * 0.09;
                
                ballCore.material.color.setHex(0xffaa00);
                ballCore.material.emissive.setHex(0xffaa00);
            }
        }

        window.addEventListener('pointerdown', (e) => { if(e.pointerType === 'mouse') handleStrikeInput(e.clientX, e.clientY); });
        window.addEventListener('touchstart', (e) => { if(e.touches.length > 0) handleStrikeInput(e.touches[0].clientX, e.touches[0].clientY); }, { passive: true });

        // --- 8. ANIMATION LOOP & RUNTIME ---
        function animate() {
            requestAnimationFrame(animate);
            const elapsedTime = clock.getElapsedTime();

            // Animate and Cheer the Audience based on multipliers
            audienceMembers.forEach(member => {
                const cheerIntensity = streakMultiplier > 1 ? 1.8 : 1.0;
                member.mesh.position.y = member.baseY + Math.sin(elapsedTime * member.speed + member.offset) * 0.15 * cheerIntensity;
            });

            if(shockwaveMat.opacity > 0) {
                shockwaveMat.opacity -= 0.04;
                shockwave.scale.addScalar(0.14);
            }

            if(particleMaterial.opacity > 0) {
                particleMaterial.opacity -= 0.025;
                const pPos = particleGeometry.attributes.position.array;
                for(let i=0; i<particleCount; i++) {
                    pPos[i*3] += velocities[i].x; pPos[i*3+1] += velocities[i].y; pPos[i*3+2] += velocities[i].z;
                }
                particleGeometry.attributes.position.needsUpdate = true;
            }

            if (cameraShakeIntensity > 0) {
                camera.position.set(
                    originalCamPos.x + (Math.random() - 0.5) * cameraShakeIntensity,
                    originalCamPos.y + (Math.random() - 0.5) * cameraShakeIntensity,
                    originalCamPos.z + (Math.random() - 0.5) * cameraShakeIntensity
                );
                cameraShakeIntensity -= 0.015;
            } else {
                camera.position.copy(originalCamPos);
            }
            camera.lookAt(0, 1.8, 0);

            ballVelocity.y += gravity;
            ballPos.add(ballVelocity);

            // Left Player AI tracking logic
            if(ballPos.x < 0) {
                playerLeft.mesh.position.z = THREE.MathUtils.lerp(playerLeft.mesh.position.z, ballPos.z, 0.15);
                playerLeft.mesh.position.x = THREE.MathUtils.lerp(playerLeft.mesh.position.x, Math.max(-7.5, ballPos.x - 0.5), 0.09);
                playerLeft.lArm.rotation.x = THREE.MathUtils.lerp(playerLeft.lArm.rotation.x, -Math.PI * 1.1, 0.25);
                playerLeft.rArm.rotation.x = THREE.MathUtils.lerp(playerLeft.rArm.rotation.x, -Math.PI * 1.1, 0.25);
            } else {
                playerLeft.mesh.position.z = THREE.MathUtils.lerp(playerLeft.mesh.position.z, 0, 0.05);
                playerLeft.mesh.position.x = THREE.MathUtils.lerp(playerLeft.mesh.position.x, -5.2, 0.06);
                playerLeft.lArm.rotation.x = THREE.MathUtils.lerp(playerLeft.lArm.rotation.x, 0, 0.1);
                playerLeft.rArm.rotation.x = THREE.MathUtils.lerp(playerLeft.rArm.rotation.x, 0, 0.1);
            }

            // Right Player AI tracking logic
            if(ballPos.x > 0) {
                playerRight.mesh.position.z = THREE.MathUtils.lerp(playerRight.mesh.position.z, ballPos.z, 0.15);
                playerRight.mesh.position.x = THREE.MathUtils.lerp(playerRight.mesh.position.x, Math.min(7.5, ballPos.x + 0.5), 0.09);
                playerRight.lArm.rotation.x = THREE.MathUtils.lerp(playerRight.lArm.rotation.x, -Math.PI * 1.1, 0.25);
                playerRight.rArm.rotation.x = THREE.MathUtils.lerp(playerRight.rArm.rotation.x, -Math.PI * 1.1, 0.25);
            } else {
                playerRight.mesh.position.z = THREE.MathUtils.lerp(playerRight.mesh.position.z, 0, 0.05);
                playerRight.mesh.position.x = THREE.MathUtils.lerp(playerRight.mesh.position.x, 5.2, 0.06);
                playerRight.lArm.rotation.x = THREE.MathUtils.lerp(playerRight.lArm.rotation.x, 0, 0.1);
                playerRight.rArm.rotation.x = THREE.MathUtils.lerp(playerRight.rArm.rotation.x, 0, 0.1);
            }

            if (Math.abs(ballPos.x) < ballRadius && ballPos.y < 3.3 && ballPos.y > 1.0) {
                ballVelocity.x *= -0.7; ballPos.x = Math.sign(ballVelocity.x) * ballRadius;
            }

            if (ballPos.y <= ballRadius) {
                playMissSound();
                baseScore = 0; streakMultiplier = 1; cumulativeScore = 0;
                document.getElementById('score').innerText = 0;
                document.getElementById('mult').innerText = "x1";

                ballPos.set((Math.random() > 0.5 ? 4.5 : -4.5), 6, (Math.random() - 0.5) * 2.5);
                ballVelocity.set(ballPos.x > 0 ? -0.065 : 0.065, 0.07, 0);
                ballCore.material.color.setHex(0xff3300); ballCore.material.emissive.setHex(0xff6600);
            }

            if (Math.abs(ballPos.z) > 4.4) ballVelocity.z *= -1;
            if (Math.abs(ballPos.x) > 8.9) ballVelocity.x *= -1;

            ballGroup.position.copy(ballPos);
            ballCore.rotation.x += 0.03; ballCore.rotation.y += 0.04;
            ballRing1.rotation.y += 0.06; ballRing2.rotation.x += 0.06;

            renderer.render(scene, camera);
        }

        // Adaptive HD Resize Scale Window
        window.addEventListener('resize', () => {
            const width = window.innerWidth;
            const height = window.innerHeight;
            
            camera.aspect = width / height;
            
            if(width < 768) {
                camera.fov = 76; 
                camera.position.set(0, 8.0, 15.0);
                originalCamPos.set(0, 8.0, 15.0);
                hitBoxCollider.geometry = new THREE.SphereGeometry(ballRadius * 6.2, 8, 8); 
            } else {
                camera.fov = 60;
                camera.position.set(0, 7.0, 13.5);
                originalCamPos.set(0, 7.0, 13.5);
                hitBoxCollider.geometry = new THREE.SphereGeometry(ballRadius * 4.6, 8, 8);
            }
            
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        });

        window.dispatchEvent(new Event('resize'));
        animate();
    </script>
</body>
</html>
