<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KTM RC 390 | Sound</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script type="module">
  import { inject } from 'https://cdn.jsdelivr.net/npm/@vercel/analytics@2/dist/index.mjs';
  inject();
</script>
<style>
  :root {
    --orange: #FF6200;
    --dark-orange: #cc4e00;
    --black: #0a0a0a;
    --dark: #111;
    --gray: #1e1e1e;
    --white: #f0f0f0;
    --silver: #888;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--black);
    font-family: 'Barlow', sans-serif;
    color: var(--white);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* Noise */
  body::after {
    content:'';position:fixed;inset:0;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events:none;z-index:0;opacity:.3;
  }

  /* HEADER */
  header {
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 28px;
    background: rgba(10,10,10,0.95);
    border-bottom: 1px solid #1c1c1c;
    backdrop-filter: blur(10px);
  }
  .logo-wrap { display:flex; align-items:center; gap:12px; }
  .ktm-badge {
    background: var(--orange); color: #fff;
    font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:22px;
    letter-spacing:2px; padding:6px 14px;
    clip-path: polygon(0 0,calc(100% - 8px) 0,100% 100%,8px 100%);
  }
  .tagline { font-family:'Barlow Condensed',sans-serif; font-weight:600; font-size:11px; letter-spacing:4px; color:var(--silver); text-transform:uppercase; }
  .model-tag {
    font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:13px;
    letter-spacing:3px; color:var(--orange); border:1px solid var(--orange);
    padding:5px 14px; clip-path:polygon(8px 0,100% 0,calc(100% - 8px) 100%,0 100%);
  }

  /* MAIN */
  main {
    flex:1; position:relative; z-index:1;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding: 40px 20px;
    overflow: hidden;
  }

  /* Diagonal glow line */
  main::before {
    content:''; position:absolute;
    top:-60px; left:-10%; width:120%; height:2px;
    background: linear-gradient(90deg,transparent 0%,var(--orange) 40%,var(--orange) 60%,transparent 100%);
    transform: rotate(-2deg);
    box-shadow: 0 0 40px rgba(255,98,0,0.5);
  }

  /* TITLE */
  .hero-title {
    font-family:'Barlow Condensed',sans-serif; font-weight:900;
    font-size: clamp(64px,14vw,120px); line-height:.88; text-align:center;
    letter-spacing:-2px; text-transform:uppercase;
    margin-bottom: 6px;
  }
  .hero-title span { color:var(--orange); display:block; }
  .hero-sub {
    font-family:'Barlow Condensed',sans-serif; font-size:12px;
    letter-spacing:6px; color:var(--silver); text-transform:uppercase;
    margin-bottom: 48px;
  }

  /* WAVEFORM VISUALISER */
  .vis-wrap {
    width: min(420px, 90vw);
    height: 80px;
    margin-bottom: 40px;
    position: relative;
    border: 1px solid #1c1c1c;
    background: #0d0d0d;
    overflow: hidden;
  }
  .vis-wrap canvas { display:block; width:100%; height:100%; }

  /* PROGRESS + TIME */
  .progress-wrap {
    width: min(420px, 90vw);
    margin-bottom: 12px;
  }
  .progress-bar-bg {
    width:100%; height:4px; background:#1e1e1e;
    clip-path: polygon(3px 0,100% 0,calc(100% - 3px) 100%,0 100%);
    cursor: pointer; position:relative;
  }
  .progress-bar-fill {
    height:100%; background:var(--orange); width:0%;
    transition: width 0.1s linear;
    box-shadow: 0 0 8px rgba(255,98,0,0.7);
  }
  .time-row {
    display:flex; justify-content:space-between;
    margin-top:6px;
    font-family:'Barlow Condensed',sans-serif; font-size:12px; letter-spacing:2px; color:var(--silver);
  }

  /* CONTROLS */
  .controls { display:flex; gap:14px; align-items:center; margin-bottom:32px; }

  .btn {
    font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:17px;
    letter-spacing:4px; text-transform:uppercase; border:none; cursor:pointer;
    padding:16px 36px; position:relative; overflow:hidden;
    clip-path: polygon(12px 0,100% 0,calc(100% - 12px) 100%,0 100%);
    transition: all .15s;
    outline: none;
  }
  .btn::before {
    content:''; position:absolute; inset:0;
    background: linear-gradient(135deg,rgba(255,255,255,.15) 0%,transparent 50%);
  }
  .btn-play { background:var(--orange); color:#fff; min-width:200px; }
  .btn-play:hover { background:var(--dark-orange); box-shadow:0 0 40px rgba(255,98,0,.5); transform:scale(1.03); }
  .btn-play:active { transform:scale(.97); }
  .btn-play.playing { animation: pulse .4s ease-in-out infinite alternate; background:#ff4500; }

  .btn-restart { background:#1a1a1a; color:var(--orange); border:1px solid #333; }
  .btn-restart:hover { background:#222; box-shadow:0 0 20px rgba(255,98,0,.2); transform:scale(1.03); }

  @keyframes pulse {
    from { box-shadow:0 0 25px rgba(255,98,0,.4); }
    to   { box-shadow:0 0 65px rgba(255,98,0,.9); }
  }

  /* VOLUME */
  .volume-row {
    display:flex; align-items:center; gap:12px;
    margin-bottom: 30px;
  }
  .vol-label {
    font-family:'Barlow Condensed',sans-serif; font-size:11px;
    letter-spacing:3px; color:var(--silver); text-transform:uppercase;
    min-width: 60px;
  }
  input[type=range] {
    -webkit-appearance:none; width:140px; height:4px;
    background: linear-gradient(90deg, var(--orange) var(--pct,70%), #222 var(--pct,70%));
    outline:none; cursor:pointer;
    clip-path: polygon(3px 0,100% 0,calc(100% - 3px) 100%,0 100%);
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance:none; width:18px; height:18px;
    background:var(--orange); cursor:pointer;
    clip-path: polygon(50% 0%,100% 100%,0% 100%);
  }

  /* SPECS */
  .specs {
    border-top:1px solid #1a1a1a; background:var(--dark);
    display:flex; justify-content:center;
    position:relative; z-index:1;
  }
  .spec { flex:1; max-width:160px; padding:18px 16px; text-align:center; border-right:1px solid #1a1a1a; }
  .spec:last-child { border-right:none; }
  .sv { font-family:'Barlow Condensed',sans-serif; font-size:24px; font-weight:900; color:var(--orange); line-height:1; }
  .su { font-size:13px; font-weight:600; color:var(--silver); }
  .sn { font-family:'Barlow Condensed',sans-serif; font-size:10px; letter-spacing:3px; color:#444; text-transform:uppercase; margin-top:3px; }

  /* Loading overlay */
  #loader {
    position:fixed; inset:0; z-index:999;
    background:var(--black); display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:16px;
  }
  .loader-badge { background:var(--orange); font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:28px; letter-spacing:3px; padding:8px 20px; clip-path:polygon(0 0,calc(100% - 10px) 0,100% 100%,10px 100%); }
  .loader-text { font-family:'Barlow Condensed',sans-serif; letter-spacing:4px; font-size:12px; color:var(--silver); text-transform:uppercase; }
  .loader-bar-bg { width:200px; height:3px; background:#1a1a1a; }
  .loader-bar-fill { height:100%; background:var(--orange); width:0; transition:width .1s; box-shadow:0 0 8px rgba(255,98,0,.8); }

  @media(max-width:600px){
    .specs { flex-wrap:wrap; }
    .spec { max-width:50%; min-width:50%; }
  }
</style>
</head>
<body>

<!-- LOADING SCREEN -->
<div id="loader">
  <div class="loader-badge">KTM</div>
  <div class="loader-text">Loading Engine Sound</div>
  <div class="loader-bar-bg"><div class="loader-bar-fill" id="lbar"></div></div>
</div>

<header>
  <div class="logo-wrap">
    <div class="ktm-badge">KTM</div>
    <div class="tagline">Ready To Race</div>
  </div>
  <div class="model-tag">RC 390 BS3</div>
</header>

<main>
  <div class="hero-title">RC<span>390</span></div>
  <div class="hero-sub">RAW EXHAUST SOUND · 373cc Single</div>

  <!-- WAVEFORM -->
  <div class="vis-wrap">
    <canvas id="waveCanvas"></canvas>
  </div>

  <!-- PROGRESS -->
  <div class="progress-wrap">
    <div class="progress-bar-bg" id="progressBg">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <div class="time-row">
      <span id="timeNow">0:00</span>
      <span id="timeTot">0:00</span>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <button class="btn btn-play" id="playBtn" onclick="togglePlay()">
      <span id="btnIcon">▶</span>&nbsp;&nbsp;<span id="btnTxt">PLAY SOUND</span>
    </button>
    <button class="btn btn-restart" onclick="restartAudio()" title="Restart">⟳ RESTART</button>
  </div>

  <!-- VOLUME -->
  <div class="volume-row">
    <span class="vol-label">🔊 VOL</span>
    <input type="range" id="volSlider" min="0" max="100" value="80" oninput="setVolume(this.value)" style="--pct:80%">
  </div>
</main>

<!-- SPECS -->
<div class="specs">
  <div class="spec"><div class="sv">373<span class="su">cc</span></div><div class="sn">Displacement</div></div>
  <div class="spec"><div class="sv">43<span class="su">PS</span></div><div class="sn">Max Power</div></div>
  <div class="spec"><div class="sv">10k<span class="su">RPM</span></div><div class="sn">Peak Power</div></div>
  <div class="spec"><div class="sv">35<span class="su">Nm</span></div><div class="sn">Peak Torque</div></div>
  <div class="spec"><div class="sv">6<span class="su">spd</span></div><div class="sn">Gearbox</div></div>
</div>

let audioCtx, sourceNode, gainNode, analyser, audioBuffer;
let isPlaying = false, startTime = 0, pauseOffset = 0;
let rafId = null;

// ─── LOAD AUDIO ──────────────────────────────────────────────────────────────
async function loadAudio() {
  const lbar = document.getElementById('lbar');
  lbar.style.width = '30%';

  const binary = atob(B64_AUDIO);
  lbar.style.width = '60%';

  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  lbar.style.width = '80%';

  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  gainNode = audioCtx.createGain();
  gainNode.gain.value = 0.8;

  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 1024;

  gainNode.connect(analyser);
  analyser.connect(audioCtx.destination);

  audioBuffer = await audioCtx.decodeAudioData(bytes.buffer);
  lbar.style.width = '100%';

  // Set total time
  document.getElementById('timeTot').textContent = fmtTime(audioBuffer.duration);

  setTimeout(() => {
    document.getElementById('loader').style.display = 'none';
    startWaveform();
  }, 300);
}

function fmtTime(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60).toString().padStart(2, '0');
  return `${m}:${sec}`;
}

// ─── PLAYBACK ─────────────────────────────────────────────────────────────────
function togglePlay() {
  if (audioCtx.state === 'suspended') audioCtx.resume();

  if (isPlaying) {
    pauseOffset += audioCtx.currentTime - startTime;
    sourceNode.stop();
    isPlaying = false;
    document.getElementById('playBtn').classList.remove('playing');
    document.getElementById('btnTxt').textContent = 'PLAY SOUND';
    document.getElementById('btnIcon').textContent = '▶';
  } else {
    playFrom(pauseOffset);
  }
}

function playFrom(offset) {
  if (sourceNode) { try { sourceNode.stop(); } catch(e){} }
  sourceNode = audioCtx.createBufferSource();
  sourceNode.buffer = audioBuffer;
  sourceNode.connect(gainNode);
  sourceNode.start(0, offset % audioBuffer.duration);
  startTime = audioCtx.currentTime - (offset % audioBuffer.duration);
  isPlaying = true;

  sourceNode.onended = () => {
    if (isPlaying) {
      isPlaying = false;
      pauseOffset = 0;
      document.getElementById('playBtn').classList.remove('playing');
      document.getElementById('btnTxt').textContent = 'PLAY SOUND';
      document.getElementById('btnIcon').textContent = '▶';
      document.getElementById('progressFill').style.width = '0%';
      document.getElementById('timeNow').textContent = '0:00';
    }
  };

  document.getElementById('playBtn').classList.add('playing');
  document.getElementById('btnTxt').textContent = 'PAUSE';
  document.getElementById('btnIcon').textContent = '❚❚';
}

function restartAudio() {
  pauseOffset = 0;
  if (isPlaying) { playFrom(0); }
  else {
    document.getElementById('progressFill').style.width = '0%';
    document.getElementById('timeNow').textContent = '0:00';
  }
}

function setVolume(v) {
  gainNode.gain.value = v / 100;
  const pct = v + '%';
  document.getElementById('volSlider').style.setProperty('--pct', pct);
}

// PROGRESS BAR CLICK
document.getElementById('progressBg').addEventListener('click', function(e) {
  if (!audioBuffer) return;
  const rect = this.getBoundingClientRect();
  const frac = (e.clientX - rect.left) / rect.width;
  pauseOffset = frac * audioBuffer.duration;
  if (isPlaying) playFrom(pauseOffset);
  else {
    document.getElementById('progressFill').style.width = (frac * 100) + '%';
    document.getElementById('timeNow').textContent = fmtTime(pauseOffset);
  }
});

// ─── WAVEFORM CANVAS ─────────────────────────────────────────────────────────
function startWaveform() {
  const canvas = document.getElementById('waveCanvas');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width = canvas.offsetWidth * devicePixelRatio;
    canvas.height = canvas.offsetHeight * devicePixelRatio;
    ctx.scale(devicePixelRatio, devicePixelRatio);
  }
  resize();
  window.addEventListener('resize', resize);

  const bufLen = analyser.frequencyBinCount;
  const dataArr = new Uint8Array(bufLen);

  function draw() {
    rafId = requestAnimationFrame(draw);
    analyser.getByteTimeDomainData(dataArr);

    const W = canvas.offsetWidth, H = canvas.offsetHeight;
    ctx.clearRect(0, 0, W, H);

    // Dark bg
    ctx.fillStyle = '#0d0d0d';
    ctx.fillRect(0, 0, W, H);

    // Centre line
    ctx.strokeStyle = '#1c1c1c';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, H/2); ctx.lineTo(W, H/2); ctx.stroke();

    // Update progress
    if (isPlaying && audioBuffer) {
      const elapsed = (audioCtx.currentTime - startTime) % audioBuffer.duration;
      const pct = (elapsed / audioBuffer.duration) * 100;
      document.getElementById('progressFill').style.width = pct + '%';
      document.getElementById('timeNow').textContent = fmtTime(elapsed);
    }

    // Waveform
    ctx.lineWidth = 2;
    const gradient = ctx.createLinearGradient(0, 0, W, 0);
    gradient.addColorStop(0, 'rgba(255,98,0,0.3)');
    gradient.addColorStop(0.5, '#FF6200');
    gradient.addColorStop(1, 'rgba(255,98,0,0.3)');
    ctx.strokeStyle = gradient;
    ctx.shadowColor = '#FF6200';
    ctx.shadowBlur = isPlaying ? 8 : 0;

    ctx.beginPath();
    const sliceW = W / bufLen;
    let x = 0;
    for (let i = 0; i < bufLen; i++) {
      const v = dataArr[i] / 128;
      const y = (v * H) / 2;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      x += sliceW;
    }
    ctx.stroke();
    ctx.shadowBlur = 0;
  }
  draw();
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
loadAudio().catch(err => {
  document.getElementById('loader').innerHTML = `<div style="color:#FF6200;font-family:'Barlow Condensed';font-size:20px;letter-spacing:3px;">AUDIO LOAD ERROR</div><div style="color:#888;font-size:12px;margin-top:8px;">${err.message}</div>`;
});
</script>
